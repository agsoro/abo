<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki – ABO Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #334155;
            --red: #dc2626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }
        header {
            background-color: var(--surface-color);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        header h1 {
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header-nav { display: flex; align-items: center; gap: 0.75rem; }
        .header-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            padding: 0.35rem 0.75rem;
            border-radius: 0.25rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .header-nav a:hover { color: var(--text-color); border-color: var(--primary-color); }
        .header-nav a.active { color: var(--text-color); border-color: var(--primary-color); background-color: rgba(59, 130, 246, 0.1); }
        .user-info { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; padding-left: 1rem; border-left: 1px solid var(--border-color); }
        .username-display { color: var(--text-muted); font-size: 0.875rem; }
        #status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; background-color: #dc2626; margin-left: 0.5rem; }
        #status-badge.healthy { background-color: #16a34a; }
        #env-selector {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.4rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            min-width: 150px;
        }
        #env-selector:focus { outline: none; border-color: var(--primary-color); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        /* Breadcrumb navigation */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .breadcrumb a:hover { color: var(--primary-color); }
        .breadcrumb-sep { color: var(--text-muted); }
        .breadcrumb-current { color: var(--text-color); font-weight: 500; }

        /* Page list view */
        .page-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .page-item {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .page-item:hover {
            border-color: var(--primary-color);
            background-color: rgba(59, 130, 246, 0.05);
        }
        .page-item-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .page-item-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 1rem;
        }
        .page-item-path {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.7;
        }
        .folder-icon { color: #fbbf24; }
        .file-icon { color: var(--primary-color); }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
        }
        .back-btn:hover { border-color: var(--primary-color); }

        /* Wiki page content (rendered markdown) */
        .wiki-content {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 2rem;
            line-height: 1.7;
        }
        .wiki-content h1 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }
        .wiki-content h2 { font-size: 1.4rem; margin: 1.5rem 0 0.75rem; }
        .wiki-content h3 { font-size: 1.2rem; margin: 1.25rem 0 0.5rem; }
        .wiki-content h4, .wiki-content h5, .wiki-content h6 { font-size: 1rem; margin: 1rem 0 0.5rem; }
        .wiki-content p { margin-bottom: 1rem; }
        .wiki-content ul, .wiki-content ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        .wiki-content li { margin-bottom: 0.35rem; }
        .wiki-content code {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }
        .wiki-content pre {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        .wiki-content pre code {
            background: none;
            padding: 0;
        }
        .wiki-content blockquote {
            border-left: 3px solid var(--primary-color);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-muted);
        }
        .wiki-content a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .wiki-content a:hover { text-decoration: underline; }
        .wiki-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        .wiki-content th, .wiki-content td {
            border: 1px solid var(--border-color);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .wiki-content th { background-color: rgba(0, 0, 0, 0.2); }
        .wiki-content img { max-width: 100%; border-radius: 0.25rem; }
        .wiki-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.5rem 0;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state-text { font-size: 1rem; }

        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .loading-spinner {
            animation: spin 1s linear infinite;
            font-size: 1.5rem;
            margin-right: 0.75rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Error state */
        .error-state {
            background-color: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 0.5rem;
            padding: 1.5rem;
            color: var(--red);
            text-align: center;
        }

        /* Section headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 1.5rem 0 0.75rem;
        }
        .section-header:first-child { margin-top: 0; }

        /* Responsive */
        @media (max-width: 600px) {
            header { padding: 1rem; }
            header h1 { font-size: 1.1rem; }
            .container { padding: 1rem; }
            .wiki-content { padding: 1.25rem; }
        }
    </style>
</head>
<body>
<header>
    <h1>📖 Wiki</h1>
    <div class="header-nav">
        <a href="/">💬 Chat</a>
        <a href="/dashboard/">🗂️ Dashboard</a>
        <a href="/agents/">🤖 Agents</a>
        <a href="/open-work/">📋 Offene Arbeit</a>
        <a href="/environments/">🌍 Environments</a>
    </div>
    <select id="env-selector">
        <option value="">Select Environment...</option>
    </select>
    <div id="status-badge">Prüfe API Status...</div>
    <div class="user-info">
        <span class="username-display" id="username-display"></span>
    </div>
</header>

<div class="container">
    <!-- Breadcrumb navigation -->
    <nav class="breadcrumb" id="breadcrumb">
        <a href="#" onclick="showIndex(); return false;">Wiki</a>
    </nav>

    <!-- Content area -->
    <main id="content">
        <div class="loading">
            <span class="loading-spinner">⏳</span>
            <span>Loading...</span>
        </div>
    </main>
</div>

<script>
    let currentEnv = '';
    let currentPath = '';
    let pagesCache = {};

    // ── Auth Helper Functions ────────────────────────────────────────────────

    /**
     * Fetch wrapper that adds Authorization header if token exists
     */
    async function fetchWithAuth(url, options = {}) {
        const token = sessionStorage.getItem('authToken');
        if (token) {
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`
            };
        }
        return fetch(url, options);
    }

    /**
     * Check if user is authenticated by validating the token with the server
     */
    async function checkAuth() {
        const token = sessionStorage.getItem('authToken');
        if (!token) {
            window.location.href = '/login.html';
            return false;
        }

        try {
            const res = await fetchWithAuth('/api/auth/me');
            if (!res.ok) {
                throw new Error('Not authenticated');
            }

            const data = await res.json();
            
            // Update username display
            if (data.username) {
                sessionStorage.setItem('username', data.username);
                document.getElementById('username-display').textContent = data.username;
            } else {
                const storedUsername = sessionStorage.getItem('username');
                document.getElementById('username-display').textContent = storedUsername || '';
            }

            return true;
        } catch (error) {
            sessionStorage.removeItem('authToken');
            sessionStorage.removeItem('username');
            window.location.href = '/login.html';
            return false;
        }
    }

    // ── Status Check ────────────────────────────────────────────────────────

    async function checkStatus() {
        const statusBadge = document.getElementById('status-badge');
        try {
            const res = await fetchWithAuth('/api/status');
            const data = await res.json();
            if (data.status === 'Running') {
                if (data.hasApiKey) {
                    statusBadge.textContent = `Online (${data.model})`;
                    statusBadge.className = 'healthy';
                } else {
                    statusBadge.textContent = `Warnung: API-Key fehlt`;
                    statusBadge.className = '';
                }
            }
        } catch (err) {
            statusBadge.textContent = 'Offline';
        }
    }

    // ── Initialization ─────────────────────────────────────────────────────

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        // Check authentication first
        const isAuthenticated = await checkAuth();
        if (!isAuthenticated) return;
        
        // Load environments and check status
        loadEnvironments();
        checkStatus();
        
        // Handle URL hash for deep linking
        handleHashChange();
        window.addEventListener('hashchange', handleHashChange);
        
        // Environment selector change
        document.getElementById('env-selector').addEventListener('change', (e) => {
            currentEnv = e.target.value;
            if (currentEnv) {
                showIndex();
                updateHash();
            }
        });
    });

    function handleHashChange() {
        const hash = window.location.hash.slice(1); // Remove #
        if (!hash) return;
        
        const parts = hash.split('/');
        if (parts.length >= 1) {
            const env = decodeURIComponent(parts[0]);
            const path = parts.length > 1 ? decodeURIComponent(parts.slice(1).join('/')) : '';
            
            document.getElementById('env-selector').value = env;
            currentEnv = env;
            
            if (path) {
                showPage(path);
            } else {
                showIndex();
            }
        }
    }

    function updateHash() {
        if (currentEnv) {
            const path = currentPath ? '/' + encodeURIComponent(currentPath) : '';
            window.location.hash = encodeURIComponent(currentEnv) + path;
        }
    }

    async function loadEnvironments() {
        try {
            const response = await fetchWithAuth('/api/environments');
            const envs = await response.json();
            const selector = document.getElementById('env-selector');
            
            selector.innerHTML = '<option value="">Select Environment...</option>' +
                envs.map(e => `<option value="${escapeHtml(e.name)}">${escapeHtml(e.displayName || e.name)}</option>`).join('');
            
            // Auto-select from hash if present
            const hash = window.location.hash.slice(1);
            if (hash) {
                const env = decodeURIComponent(hash.split('/')[0]);
                if (envs.some(e => e.name === env)) {
                    selector.value = env;
                    currentEnv = env;
                }
            }
            
            // Show index if env is selected
            if (currentEnv) {
                showIndex();
            }
        } catch (error) {
            showError('Failed to load environments');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'short', 
            day: 'numeric' 
        });
    }

    function buildBreadcrumb(path) {
        const parts = path.split('/');
        let html = '<a href="#" onclick="showIndex(); return false;">Wiki</a>';
        
        let accumulatedPath = '';
        parts.forEach((part, index) => {
            accumulatedPath += (index > 0 ? '/' : '') + part;
            if (index < parts.length - 1) {
                const encoded = encodeURIComponent(accumulatedPath);
                html += `<span class="breadcrumb-sep">/</span><a href="#${encodeURIComponent(currentEnv)}/${encoded}" onclick="showPage('${escapeHtml(accumulatedPath)}'); return false;">${escapeHtml(part)}</a>`;
            } else {
                html += `<span class="breadcrumb-sep">/</span><span class="breadcrumb-current">${escapeHtml(part)}</span>`;
            }
        });
        
        document.getElementById('breadcrumb').innerHTML = html;
    }

    function showIndex() {
        currentPath = '';
        updateHash();
        buildBreadcrumb('');
        loadPages();
    }

    async function loadPages(parentPath = '') {
        const content = document.getElementById('content');
        content.innerHTML = `
            <div class="loading">
                <span class="loading-spinner">⏳</span>
                <span>Loading pages...</span>
            </div>
        `;

        try {
            const url = parentPath 
                ? `/api/wiki/${encodeURIComponent(currentEnv)}/pages?parentPath=${encodeURIComponent(parentPath)}`
                : `/api/wiki/${encodeURIComponent(currentEnv)}/pages`;
            
            const response = await fetchWithAuth(url);
            
            if (!response.ok) {
                if (response.status === 404) {
                    showNoWiki();
                    return;
                }
                throw new Error('Failed to load pages');
            }
            
            const pages = await response.json();
            pagesCache[parentPath] = pages;
            
            renderPageList(pages, parentPath);
        } catch (error) {
            showError('Failed to load wiki pages: ' + error.message);
        }
    }

    function renderPageList(pages, parentPath = '') {
        const content = document.getElementById('content');
        
        if (!pages.length) {
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📄</div>
                    <div class="empty-state-text">No wiki pages found for this environment.</div>
                </div>
            `;
            return;
        }

        // Group pages by parent path
        const rootPages = pages.filter(p => !p.parentPath || p.parentPath === parentPath);
        const subfolders = [...new Set(rootPages
            .filter(p => p.path.includes('/'))
            .map(p => p.path.split('/')[0])
            .filter(f => f)]) || [];
        
        let html = '<div class="page-list">';
        
        // Add folder entries if any
        const uniqueFolders = [...new Set(subfolders)];
        uniqueFolders.forEach(folder => {
            html += `
                <div class="page-item" onclick="navigateFolder('${escapeHtml(folder)}')">
                    <span class="page-item-title">
                        <span class="folder-icon">📁</span>
                        ${escapeHtml(folder)}
                    </span>
                    <span class="page-item-path">${escapeHtml(folder)}/</span>
                </div>
            `;
        });
        
        // Add page entries
        const filePages = rootPages.filter(p => !p.path.includes('/') || p.path.split('/').length === 1);
        filePages.forEach(page => {
            const displayName = page.path.includes('/') ? page.path.split('/')[1] : page.title;
            html += `
                <div class="page-item" onclick="showPage('${escapeHtml(page.path)}')">
                    <span class="page-item-title">
                        <span class="file-icon">📄</span>
                        ${escapeHtml(page.title || displayName)}
                    </span>
                    <div class="page-item-meta">
                        ${page.lastModified ? `<span>Modified: ${formatDate(page.lastModified)}</span>` : ''}
                    </div>
                    <span class="page-item-path">${escapeHtml(page.path)}</span>
                </div>
            `;
        });
        
        html += '</div>';
        content.innerHTML = html;
    }

    function navigateFolder(folder) {
        // Find the first page in this folder to navigate to
        const pages = pagesCache[''] || [];
        const folderPages = pages.filter(p => p.path.startsWith(folder + '/'));
        if (folderPages.length > 0) {
            showPage(folderPages[0].path);
        }
    }

    async function showPage(path) {
        currentPath = path;
        updateHash();
        buildBreadcrumb(path);
        
        const content = document.getElementById('content');
        content.innerHTML = `
            <button class="back-btn" onclick="showIndex()">
                ← Back to Index
            </button>
            <div class="loading">
                <span class="loading-spinner">⏳</span>
                <span>Loading page...</span>
            </div>
        `;

        try {
            const response = await fetchWithAuth(`/api/wiki/${encodeURIComponent(currentEnv)}/page/${encodeURIComponent(path)}`);
            
            if (!response.ok) {
                throw new Error('Page not found');
            }
            
            const page = await response.json();
            renderPage(page);
        } catch (error) {
            content.innerHTML = `
                <button class="back-btn" onclick="showIndex()">
                    ← Back to Index
                </button>
                <div class="error-state">
                    Failed to load page: ${escapeHtml(error.message)}
                </div>
            `;
        }
    }

    function renderPage(page) {
        const content = document.getElementById('content');
        const htmlContent = marked.parse(page.content || '');
        
        content.innerHTML = `
            <button class="back-btn" onclick="showIndex()">
                ← Back to Index
            </button>
            <article class="wiki-content">
                ${htmlContent}
            </article>
        `;
        
        // Make external links open in new tab
        content.querySelectorAll('.wiki-content a[href^="http"]').forEach(link => {
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
        });
    }

    function showNoWiki() {
        const content = document.getElementById('content');
        content.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">📖</div>
                <div class="empty-state-text">No wiki configured for this environment.</div>
                <p style="margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.7;">
                    Wiki documentation can be added to the environment's docs folder.
                </p>
            </div>
        `;
    }

    function showError(message) {
        const content = document.getElementById('content');
        content.innerHTML = `
            <div class="error-state">
                ${escapeHtml(message)}
            </div>
        `;
    }
</script>
</body>
</html>
