<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ABO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #1a1a2e;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }

        input.error {
            border-color: #dc3545;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #3a7bc8;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
        }

        .error-message {
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.8rem;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Password change prompt */
        .password-change-notice {
            background: #fffbeb;
            border: 1px solid #f59e0b;
            color: #92400e;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .password-change-notice.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>ABO</h1>
            <p>Agent-Based Orchestrator</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="passwordChangeNotice" class="password-change-notice">
            ⚠️ Please change your password after logging in.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>

            <button type="submit" id="loginBtn">
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <div class="footer">
            Secured with BCrypt password hashing
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const errorMessage = document.getElementById('errorMessage');
        const passwordChangeNotice = document.getElementById('passwordChangeNotice');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            usernameInput.classList.add('error');
            passwordInput.classList.add('error');
        }

        function hideError() {
            errorMessage.classList.remove('show');
            usernameInput.classList.remove('error');
            passwordInput.classList.remove('error');
        }

        function setLoading(loading) {
            loginBtn.disabled = loading;
            btnText.innerHTML = loading ? '<span class="spinner"></span>Signing in...' : 'Sign In';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showError('Please enter both username and password.');
                setLoading(false);
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Store token in sessionStorage (not localStorage for security)
                    sessionStorage.setItem('auth_token', data.token);
                    sessionStorage.setItem('auth_username', data.username);
                    
                    // Check if password needs to be changed
                    try {
                        const meResponse = await fetch('/api/auth/me', {
                            headers: {
                                'Authorization': `Bearer ${data.token}`
                            }
                        });
                        
                        if (meResponse.ok) {
                            const meData = await meResponse.json();
                            sessionStorage.setItem('auth_roles', JSON.stringify(meData.roles || []));
                            
                            if (!meData.passwordChanged) {
                                // Show password change notice and redirect to change password
                                passwordChangeNotice.classList.add('show');
                                sessionStorage.setItem('force_password_change', 'true');
                            }
                        }
                    } catch (e) {
                        console.error('Error checking user status:', e);
                    }
                    
                    // Redirect to main page
                    window.location.href = '/';
                } else if (response.status === 401) {
                    showError('Invalid username or password.');
                } else {
                    showError('Login failed. Please try again.');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Unable to connect to server. Please try again.');
            }

            setLoading(false);
        });

        // Clear error on input
        usernameInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);
    </script>
</body>
</html>
