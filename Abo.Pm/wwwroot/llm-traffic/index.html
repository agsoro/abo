<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO – LLM Traffic Viewer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #334155;
            --request-color: #2563eb;
            --request-bg: #1e3a5f;
            --response-color: #16a34a;
            --response-bg: #14532d;
            --error-color: #dc2626;
            --error-bg: #450a0a;
            --tag-radius: 0.25rem;

            /* Role badge colors */
            --role-system-bg:    rgba(139, 92, 246, 0.15);
            --role-system-fg:    #a78bfa;
            --role-system-border: rgba(139, 92, 246, 0.4);
            --role-user-bg:      rgba(59, 130, 246, 0.15);
            --role-user-fg:      #60a5fa;
            --role-user-border:  rgba(59, 130, 246, 0.4);
            --role-assistant-bg: rgba(22, 163, 74, 0.15);
            --role-assistant-fg: #4ade80;
            --role-assistant-border: rgba(22, 163, 74, 0.4);
            --role-tool-bg:      rgba(234, 88, 12, 0.15);
            --role-tool-fg:      #fb923c;
            --role-tool-border:  rgba(234, 88, 12, 0.4);

            /* Finish reason colors */
            --finish-stop-fg:       #4ade80;
            --finish-toolcalls-fg:  #fbbf24;
            --finish-length-fg:     #f87171;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            background-color: var(--surface-color);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .header-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.35rem 0.75rem;
            border-radius: var(--tag-radius);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .header-nav a:hover {
            color: var(--text-color);
            border-color: var(--primary-color);
        }

        .header-nav a.active {
            color: var(--text-color);
            border-color: var(--primary-color);
            background-color: rgba(59, 130, 246, 0.1);
        }

        #status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        #status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #94a3b8;
            transition: background-color 0.3s;
        }

        #status-dot.live {
            background-color: #16a34a;
            box-shadow: 0 0 6px #16a34a;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            align-items: center;
        }

        .toolbar label {
            color: var(--text-muted);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .toolbar select,
        .toolbar input[type="text"],
        .toolbar input[type="number"] {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.4rem 0.75rem;
            border-radius: var(--tag-radius);
            font-size: 0.875rem;
        }

        .toolbar select:focus,
        .toolbar input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .toolbar .spacer { flex: 1; }

        #entry-count {
            font-size: 0.875rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .entry-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .entry-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .entry-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            user-select: none;
            flex-wrap: wrap;
        }

        .entry-header:hover {
            background-color: rgba(255,255,255,0.03);
        }

        .type-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.55rem;
            border-radius: 9999px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            min-width: 4.5rem;
            text-align: center;
            flex-shrink: 0;
        }

        .type-badge.REQUEST {
            background-color: var(--request-bg);
            color: #60a5fa;
            border: 1px solid var(--request-color);
        }

        .type-badge.RESPONSE {
            background-color: var(--response-bg);
            color: #4ade80;
            border: 1px solid var(--response-color);
        }

        .type-badge.ERROR {
            background-color: var(--error-bg);
            color: #f87171;
            border: 1px solid var(--error-color);
        }

        .type-badge.SUMMARY {
            background-color: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.5);
        }

        .entry-timestamp {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .entry-session {
            font-size: 0.8rem;
            color: var(--text-muted);
            background-color: rgba(255,255,255,0.05);
            padding: 0.15rem 0.5rem;
            border-radius: var(--tag-radius);
            font-family: monospace;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .header-meta-badges {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .meta-pill {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            background-color: rgba(255,255,255,0.07);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .meta-pill.model { color: #93c5fd; }
        .meta-pill.tools { color: #fb923c; }
        .meta-pill.msgs  { color: #a78bfa; }
        .meta-pill.cost  { color: #4ade80; }
        .meta-pill.finish-stop       { color: var(--finish-stop-fg);      border-color: var(--finish-stop-fg); }
        .meta-pill.finish-tool_calls { color: var(--finish-toolcalls-fg); border-color: var(--finish-toolcalls-fg); }
        .meta-pill.finish-length     { color: var(--finish-length-fg);    border-color: var(--finish-length-fg); }

        .entry-preview {
            flex: 1;
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .expand-icon {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.75rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .entry-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .entry-body {
            display: none;
            border-top: 1px solid var(--border-color);
            padding: 1rem;
            background-color: rgba(0,0,0,0.2);
        }

        .entry-card.expanded .entry-body {
            display: block;
        }

        /* ── Structured body ── */

        .structured-body { font-size: 0.875rem; }

        .section-block {
            margin-bottom: 0.875rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.75rem;
            background-color: rgba(255,255,255,0.04);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: default;
        }

        .section-content { padding: 0.65rem 0.75rem; }

        /* metadata grid */
        .meta-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
        }

        .meta-item { display: flex; flex-direction: column; gap: 0.15rem; }
        .meta-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .meta-value { font-size: 0.82rem; color: var(--text-color); font-family: monospace; }

        /* Message rows */
        .msg-row {
            display: flex;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            align-items: flex-start;
        }

        .msg-row:last-child { border-bottom: none; }

        .role-badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 0.2rem 0.55rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 5.5rem;
            text-align: center;
            border: 1px solid transparent;
        }

        .role-badge.system    { background-color: var(--role-system-bg);    color: var(--role-system-fg);    border-color: var(--role-system-border); }
        .role-badge.user      { background-color: var(--role-user-bg);      color: var(--role-user-fg);      border-color: var(--role-user-border); }
        .role-badge.assistant { background-color: var(--role-assistant-bg); color: var(--role-assistant-fg); border-color: var(--role-assistant-border); }
        .role-badge.tool      { background-color: var(--role-tool-bg);      color: var(--role-tool-fg);      border-color: var(--role-tool-border); }

        .msg-content {
            flex: 1;
            min-width: 0;
            color: var(--text-color);
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-content.muted { color: var(--text-muted); font-style: italic; font-size: 0.82rem; }

        /* System prompt collapse */
        .system-prompt-preview { white-space: pre-wrap; font-size: 0.82rem; }
        .system-prompt-full    { display: none; white-space: pre-wrap; font-size: 0.82rem; }

        .expand-msg-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.15rem 0;
            margin-top: 0.25rem;
            display: block;
        }

        .expand-msg-btn:hover { text-decoration: underline; }

        /* Tool call blocks */
        .tool-calls-container { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem; }

        .tool-call-block {
            border: 1px solid rgba(234, 88, 12, 0.3);
            border-radius: 0.375rem;
            overflow: hidden;
            background-color: rgba(234, 88, 12, 0.05);
        }

        .tool-call-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.65rem;
            background-color: rgba(234, 88, 12, 0.1);
            cursor: pointer;
        }

        .tool-call-name {
            font-family: monospace;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--role-tool-fg);
        }

        .tool-call-id-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-family: monospace;
            margin-left: auto;
        }

        .tool-call-args {
            padding: 0.5rem 0.65rem;
            margin: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
            background-color: rgba(0,0,0,0.25);
        }

        /* Tool result blocks */
        .tool-result-block {
            margin-top: 0.25rem;
            border: 1px solid rgba(234, 88, 12, 0.2);
            border-radius: 0.375rem;
            overflow: hidden;
            background-color: rgba(0,0,0,0.15);
        }

        .tool-result-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.65rem;
            background-color: rgba(234, 88, 12, 0.07);
            font-size: 0.7rem;
            color: var(--role-tool-fg);
            font-weight: 600;
            cursor: pointer;
        }

        .tool-result-id {
            font-family: monospace;
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-left: auto;
        }

        .tool-result-content {
            padding: 0.5rem 0.65rem;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            color: #cbd5e1;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
        }

        /* Usage / stats section */
        .usage-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .usage-stat { display: flex; flex-direction: column; gap: 0.15rem; }
        .usage-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .usage-value { font-size: 0.95rem; font-weight: 600; font-family: monospace; }
        .usage-value.tokens-in  { color: #60a5fa; }
        .usage-value.tokens-out { color: #4ade80; }
        .usage-value.tokens-total { color: var(--text-color); }
        .usage-value.cost { color: #fbbf24; }

        .finish-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            border: 1px solid;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .finish-badge.stop       { color: var(--finish-stop-fg);      border-color: var(--finish-stop-fg);      background-color: rgba(74, 222, 128, 0.1); }
        .finish-badge.tool_calls { color: var(--finish-toolcalls-fg); border-color: var(--finish-toolcalls-fg); background-color: rgba(251, 191, 36, 0.1); }
        .finish-badge.length     { color: var(--finish-length-fg);    border-color: var(--finish-length-fg);    background-color: rgba(248, 113, 113, 0.1); }

        /* Raw JSON toggle */
        .raw-toggle-area { margin-top: 0.75rem; }

        .raw-toggle-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.3rem 0.75rem;
            border-radius: var(--tag-radius);
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s;
        }

        .raw-toggle-btn:hover {
            border-color: var(--primary-color);
            color: var(--text-color);
        }

        .raw-json-container {
            display: none;
            margin-top: 0.5rem;
        }

        .raw-json-container pre {
            margin: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 500px;
            overflow-y: auto;
            background-color: rgba(0,0,0,0.3);
            padding: 0.75rem;
            border-radius: 0.25rem;
            border: 1px solid var(--border-color);
        }

        /* Error display */
        .error-body pre {
            margin: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.8rem;
            color: #f87171;
            white-space: pre-wrap;
            word-break: break-word;
            background-color: var(--error-bg);
            padding: 0.75rem;
            border-radius: 0.25rem;
            border: 1px solid var(--error-color);
        }

        /* collapsible toggle for tool args */
        .toggle-icon {
            font-size: 0.65rem;
            color: var(--text-muted);
            transition: transform 0.15s;
        }

        .collapsed .toggle-icon { transform: rotate(-90deg); }
        .collapsed .tool-call-args,
        .collapsed .tool-result-content { display: none; }

        /* Empty / loading states */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

        #last-updated {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>📊 LLM Traffic <span style="font-size: 1rem; color: var(--text-muted); font-weight: normal;">Viewer</span></h1>
        <nav class="header-nav">
            <a href="/">💬 Chat</a>
            <a href="/processes/">⚙️ Prozesse</a>
            <a href="/agents/">🤖 Agents</a>
            <a href="/open-work/">📋 Offene Arbeit</a>
            <a href="/llm-traffic/" class="active">📊 LLM Traffic</a>
            <a href="/llm-stats/">📈 LLM Stats</a>
        </nav>
        <div id="status-indicator">
            <div id="status-dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <main>
        <div class="toolbar">
            <label>
                Type:
                <select id="filter-type">
                    <option value="">All</option>
                    <option value="REQUEST">REQUEST</option>
                    <option value="RESPONSE">RESPONSE</option>
                    <option value="SUMMARY_REQUEST">SUMMARY_REQUEST</option>
                    <option value="SUMMARY_RESPONSE">SUMMARY_RESPONSE</option>
                    <option value="ERROR">ERROR</option>
                </select>
            </label>
            <label>
                Session:
                <input type="text" id="filter-session" placeholder="Filter by session ID..." style="width: 200px;">
            </label>
            <label>
                Limit:
                <input type="number" id="limit-input" value="100" min="1" max="1000" style="width: 80px;">
            </label>
            <div class="spacer"></div>
            <span id="entry-count">0 entries</span>
        </div>

        <div id="entry-list" class="entry-list">
            <div class="empty-state">
                <div class="icon">⏳</div>
                <p>Loading data...</p>
            </div>
        </div>

        <div id="last-updated"></div>
    </main>

    <script>
    (function () {
        'use strict';

        // ── DOM refs ──────────────────────────────────────────────────────────
        const entryListEl   = document.getElementById('entry-list');
        const entryCountEl  = document.getElementById('entry-count');
        const lastUpdatedEl = document.getElementById('last-updated');
        const statusDot     = document.getElementById('status-dot');
        const statusText    = document.getElementById('status-text');
        const filterType    = document.getElementById('filter-type');
        const filterSession = document.getElementById('filter-session');
        const limitInput    = document.getElementById('limit-input');

        let allEntries  = [];
        let expandedIds = new Set();

        // ── Helpers ───────────────────────────────────────────────────────────

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getEntryKey(entry) {
            return (entry.Timestamp || '') + '_' + (entry.SessionId || '') + '_' + (entry.Type || '');
        }

        function formatTimestamp(ts) {
            if (!ts) return '—';
            try {
                const d = new Date(ts);
                return d.toLocaleString('en-GB', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit',
                    timeZone: 'UTC', timeZoneName: 'short'
                });
            } catch (_) { return ts; }
        }

        function formatCost(cost) {
            if (cost == null || isNaN(cost)) return null;
            if (cost === 0) return '$0.00';
            if (cost < 0.0001) return '$' + cost.toExponential(2);
            return '$' + cost.toFixed(4);
        }

        function tryParseJson(str) {
            if (!str) return null;
            try { return JSON.parse(str); } catch (_) { return null; }
        }

        function prettyJson(obj) {
            try { return JSON.stringify(obj, null, 2); } catch (_) { return String(obj); }
        }

        function parsePossibleStringJson(val) {
            if (typeof val === 'string') {
                const parsed = tryParseJson(val);
                if (parsed !== null) return parsed;
            }
            return val;
        }

        // ── Entry-level type detection ────────────────────────────────────────

        function getDisplayType(entry) {
            const t = (entry.Type || '').toUpperCase();
            if (t === 'SUMMARY_REQUEST')  return 'SUMMARY';
            if (t === 'SUMMARY_RESPONSE') return 'SUMMARY';
            if (t === 'REQUEST')          return 'REQUEST';
            if (t === 'RESPONSE')         return 'RESPONSE';
            if (t === 'ERROR')            return 'ERROR';
            return t;
        }

        // ── Header preview & meta-pills ───────────────────────────────────────

        function buildHeaderMeta(entry) {
            const content = tryParseJson(entry.Content);
            const type    = (entry.Type || '').toUpperCase();
            const pills   = [];

            if (!content) return { preview: '', pillsHtml: '' };

            // Model
            const model = content.model
                || content.choices?.[0]?.model
                || null;
            if (model) {
                const short = model.includes('/') ? model.split('/').pop() : model;
                pills.push(`<span class="meta-pill model" title="${escapeHtml(model)}">${escapeHtml(short)}</span>`);
            }

            if (type === 'REQUEST' || type === 'SUMMARY_REQUEST') {
                const msgs      = content.messages || [];
                const toolCalls = msgs.filter(m => m.role === 'assistant' && m.tool_calls?.length > 0)
                                      .reduce((acc, m) => acc + m.tool_calls.length, 0);
                pills.push(`<span class="meta-pill msgs">${msgs.length} msgs</span>`);
                if (toolCalls > 0) {
                    pills.push(`<span class="meta-pill tools">${toolCalls} 🔧</span>`);
                }

                // Preview: first user message
                const userMsg  = msgs.find(m => m.role === 'user');
                const preview  = typeof userMsg?.content === 'string'
                    ? userMsg.content
                    : (Array.isArray(userMsg?.content) ? userMsg.content.map(c => c.text || '').join('') : '');
                return { preview: preview.slice(0, 120), pillsHtml: pills.join('') };
            }

            if (type === 'RESPONSE' || type === 'SUMMARY_RESPONSE') {
                const choice      = content.choices?.[0];
                const finishReason = choice?.finish_reason || '';
                const usage       = content.usage;
                const cost        = usage?.cost ?? null;

                if (finishReason) {
                    const cls = finishReason === 'stop' ? 'finish-stop'
                              : finishReason === 'tool_calls' ? 'finish-tool_calls'
                              : 'finish-length';
                    pills.push(`<span class="meta-pill ${cls}">${escapeHtml(finishReason)}</span>`);
                }
                if (usage) {
                    pills.push(`<span class="meta-pill msgs">↑${(usage.prompt_tokens||0).toLocaleString()} ↓${(usage.completion_tokens||0).toLocaleString()}</span>`);
                }
                if (cost != null) {
                    pills.push(`<span class="meta-pill cost">${escapeHtml(formatCost(cost))}</span>`);
                }

                // Preview: assistant content
                const msg     = choice?.message;
                let preview   = '';
                if (msg?.content) {
                    preview = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content);
                } else if (msg?.tool_calls?.length) {
                    const names = msg.tool_calls.map(tc => tc.function?.name || '?').join(', ');
                    preview = `⚙ tool_calls: ${names}`;
                }
                return { preview: preview.slice(0, 120), pillsHtml: pills.join('') };
            }

            if (type === 'ERROR') {
                const preview = typeof entry.Content === 'string' ? entry.Content.slice(0, 120) : '';
                return { preview, pillsHtml: '' };
            }

            return { preview: '', pillsHtml: pills.join('') };
        }

        // ── Structured body renderer ──────────────────────────────────────────

        function renderStructuredBody(entry) {
            const type    = (entry.Type || '').toUpperCase();
            const content = tryParseJson(entry.Content);

            if (!content) {
                // Fallback: plain error / unparseable
                return renderFallback(entry.Content);
            }

            if (type === 'ERROR') {
                return renderError(content, entry.Content);
            }

            if (type === 'REQUEST' || type === 'SUMMARY_REQUEST') {
                return renderRequest(content, entry.Content);
            }

            if (type === 'RESPONSE' || type === 'SUMMARY_RESPONSE') {
                return renderResponse(content, entry.Content);
            }

            return renderFallback(entry.Content);
        }

        // ── REQUEST renderer ──────────────────────────────────────────────────

        function renderRequest(parsed, rawContent) {
            const parts = [];

            // Metadata
            parts.push(renderMetaSection(parsed));

            // Messages
            const messages = parsed.messages || [];
            if (messages.length > 0) {
                parts.push(renderMessagesSection(messages));
            }

            // Tools defined in request
            const tools = parsed.tools || [];
            if (tools.length > 0) {
                parts.push(renderToolDefinitionsSection(tools));
            }

            parts.push(renderRawToggle(rawContent));
            return parts.join('');
        }

        // ── RESPONSE renderer ─────────────────────────────────────────────────

        function renderResponse(parsed, rawContent) {
            const parts = [];

            // Metadata (model)
            parts.push(renderMetaSection(parsed));

            // Choice / assistant message
            const choice = parsed.choices?.[0];
            if (choice) {
                const finishReason = choice.finish_reason || '';
                const msg = choice.message;

                // Finish reason
                if (finishReason) {
                    const cls = finishReason === 'stop' ? 'stop'
                              : finishReason === 'tool_calls' ? 'tool_calls'
                              : 'length';
                    const sectionHtml = `
                        <div class="section-block">
                            <div class="section-header">📋 Response</div>
                            <div class="section-content">
                                <span class="finish-badge ${cls}">${escapeHtml(finishReason)}</span>
                            </div>
                        </div>`;
                    parts.push(sectionHtml);
                }

                // Assistant message
                if (msg) {
                    const fakeMessages = [msg];
                    parts.push(`
                        <div class="section-block">
                            <div class="section-header">💬 Assistant Message</div>
                            <div class="section-content">
                                ${renderMessageRows(fakeMessages, {})}
                            </div>
                        </div>`);
                }
            }

            // Usage
            if (parsed.usage) {
                parts.push(renderUsageSection(parsed.usage));
            }

            parts.push(renderRawToggle(rawContent));
            return parts.join('');
        }

        // ── ERROR renderer ────────────────────────────────────────────────────

        function renderError(content, rawContent) {
            const parts = [];
            parts.push(`
                <div class="section-block error-body">
                    <div class="section-header" style="color: #f87171;">❌ Error</div>
                    <div class="section-content">
                        <pre>${escapeHtml(typeof content === 'string' ? content : prettyJson(content))}</pre>
                    </div>
                </div>`);
            parts.push(renderRawToggle(rawContent));
            return parts.join('');
        }

        // ── Fallback renderer ─────────────────────────────────────────────────

        function renderFallback(rawContent) {
            const formatted = tryParseJson(rawContent);
            const display   = formatted ? prettyJson(formatted) : (rawContent || '(empty)');
            return `<pre style="margin:0;font-family:'Consolas','Courier New',monospace;font-size:0.8rem;color:#e2e8f0;white-space:pre-wrap;word-break:break-word;max-height:600px;overflow-y:auto;background:rgba(0,0,0,0.3);padding:0.75rem;border-radius:0.25rem;border:1px solid var(--border-color);">${escapeHtml(display)}</pre>`;
        }

        // ── Section renderers ─────────────────────────────────────────────────

        function renderMetaSection(parsed) {
            const model    = parsed.model || null;
            const tools    = parsed.tools || [];
            const messages = parsed.messages || [];

            const items = [];
            if (model) {
                items.push(`<div class="meta-item"><span class="meta-label">Model</span><span class="meta-value">${escapeHtml(model)}</span></div>`);
            }
            if (messages.length > 0) {
                items.push(`<div class="meta-item"><span class="meta-label">Messages</span><span class="meta-value">${messages.length}</span></div>`);
            }
            if (tools.length > 0) {
                items.push(`<div class="meta-item"><span class="meta-label">Tools available</span><span class="meta-value">${tools.length}</span></div>`);
            }
            if (parsed.max_tokens != null) {
                items.push(`<div class="meta-item"><span class="meta-label">Max tokens</span><span class="meta-value">${parsed.max_tokens}</span></div>`);
            }
            if (parsed.temperature != null) {
                items.push(`<div class="meta-item"><span class="meta-label">Temperature</span><span class="meta-value">${parsed.temperature}</span></div>`);
            }

            if (items.length === 0) return '';

            return `
                <div class="section-block">
                    <div class="section-header">📋 Metadata</div>
                    <div class="section-content">
                        <div class="meta-grid">${items.join('')}</div>
                    </div>
                </div>`;
        }

        function renderMessagesSection(messages) {
            // Build tool call id → name map for result linking
            const toolCallMap = {};
            for (const msg of messages) {
                if (msg.role === 'assistant' && msg.tool_calls) {
                    for (const tc of msg.tool_calls) {
                        if (tc.id && tc.function?.name) {
                            toolCallMap[tc.id] = tc.function.name;
                        }
                    }
                }
            }

            const rows = renderMessageRows(messages, toolCallMap);

            return `
                <div class="section-block">
                    <div class="section-header">💬 Messages (${messages.length})</div>
                    <div class="section-content" style="padding: 0 0.75rem;">
                        ${rows}
                    </div>
                </div>`;
        }

        function renderMessageRows(messages, toolCallMap) {
            return messages.map(msg => renderSingleMessage(msg, toolCallMap)).join('');
        }

        function renderSingleMessage(msg, toolCallMap) {
            const role   = (msg.role || 'unknown').toLowerCase();
            const badgeClass = ['system', 'user', 'assistant', 'tool'].includes(role) ? role : 'user';

            let contentHtml = '';

            if (role === 'system') {
                contentHtml = renderSystemContent(msg.content);
            } else if (role === 'tool') {
                contentHtml = renderToolResultContent(msg, toolCallMap);
            } else if (role === 'assistant') {
                contentHtml = renderAssistantContent(msg);
            } else {
                // user or unknown
                contentHtml = renderUserContent(msg.content);
            }

            return `
                <div class="msg-row">
                    <span class="role-badge ${badgeClass}">${escapeHtml(msg.role || 'unknown')}</span>
                    <div class="msg-content">${contentHtml}</div>
                </div>`;
        }

        function renderSystemContent(content) {
            const text = contentToString(content);
            const PREVIEW_LEN = 200;
            const id = 'sys_' + Math.random().toString(36).slice(2, 9);

            if (text.length <= PREVIEW_LEN) {
                return `<span class="system-prompt-preview">${escapeHtml(text)}</span>`;
            }

            return `
                <span class="system-prompt-preview" id="preview_${id}">${escapeHtml(text.slice(0, PREVIEW_LEN))}…</span>
                <span class="system-prompt-full" id="full_${id}">${escapeHtml(text)}</span>
                <button class="expand-msg-btn" onclick="toggleSystemPrompt('${id}', this)">▼ Show full system prompt</button>`;
        }

        function renderUserContent(content) {
            const text = contentToString(content);
            return `<span style="white-space:pre-wrap;">${escapeHtml(text)}</span>`;
        }

        function renderAssistantContent(msg) {
            const parts = [];

            if (msg.content) {
                const text = contentToString(msg.content);
                parts.push(`<span style="white-space:pre-wrap;">${escapeHtml(text)}</span>`);
            }

            if (msg.tool_calls && msg.tool_calls.length > 0) {
                const callBlocks = msg.tool_calls.map(tc => renderToolCallBlock(tc)).join('');
                parts.push(`<div class="tool-calls-container">${callBlocks}</div>`);
            }

            if (parts.length === 0) {
                parts.push(`<span class="msg-content muted">(no content)</span>`);
            }

            return parts.join('');
        }

        function renderToolCallBlock(tc) {
            const name = tc.function?.name || '?';
            const callId = tc.id || '';
            const id = 'tc_' + Math.random().toString(36).slice(2, 9);

            let argsObj = parsePossibleStringJson(tc.function?.arguments || '{}');
            const argsDisplay = prettyJson(argsObj);

            return `
                <div class="tool-call-block" id="${id}">
                    <div class="tool-call-header" onclick="toggleCollapsible('${id}', this)">
                        <span>🔧</span>
                        <span class="tool-call-name">${escapeHtml(name)}</span>
                        <span class="toggle-icon">▼</span>
                        <span class="tool-call-id-label">${escapeHtml(callId)}</span>
                    </div>
                    <pre class="tool-call-args">${escapeHtml(argsDisplay)}</pre>
                </div>`;
        }

        function renderToolResultContent(msg, toolCallMap) {
            const callId   = msg.tool_call_id || '';
            const toolName = toolCallMap[callId] || null;
            const text     = contentToString(msg.content);
            const id       = 'tr_' + Math.random().toString(36).slice(2, 9);

            const headerLabel = toolName
                ? `📤 Result of <span style="font-family:monospace;color:var(--role-tool-fg);">${escapeHtml(toolName)}</span>`
                : `📤 Tool Result`;

            return `
                <div class="tool-result-block" id="${id}">
                    <div class="tool-result-header" onclick="toggleCollapsible('${id}', this)">
                        ${headerLabel}
                        <span class="toggle-icon">▼</span>
                        <span class="tool-result-id">${escapeHtml(callId)}</span>
                    </div>
                    <div class="tool-result-content">${escapeHtml(text)}</div>
                </div>`;
        }

        function renderToolDefinitionsSection(tools) {
            const id = 'tools_def_' + Math.random().toString(36).slice(2, 9);
            const rows = tools.map(t => {
                const fn   = t.function || t;
                const name = fn.name || '?';
                const desc = fn.description || '';
                return `<div style="padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.05);">
                    <span style="font-family:monospace;color:var(--role-tool-fg);font-weight:600;">${escapeHtml(name)}</span>
                    ${desc ? `<span style="color:var(--text-muted);font-size:0.78rem;margin-left:0.5rem;">${escapeHtml(desc)}</span>` : ''}
                </div>`;
            }).join('');

            return `
                <div class="section-block" id="${id}">
                    <div class="section-header" style="cursor:pointer;" onclick="toggleSectionCollapse('${id}', this)">
                        🛠 Tools Defined (${tools.length}) <span class="toggle-icon" style="margin-left:auto;">▼</span>
                    </div>
                    <div class="section-content" style="max-height:200px;overflow-y:auto;">
                        ${rows}
                    </div>
                </div>`;
        }

        function renderUsageSection(usage) {
            const promptTokens     = usage.prompt_tokens     ?? 0;
            const completionTokens = usage.completion_tokens ?? 0;
            const totalTokens      = usage.total_tokens      ?? (promptTokens + completionTokens);
            const cost             = usage.cost              ?? null;

            const costDisplay = cost != null ? formatCost(cost) : null;

            return `
                <div class="section-block">
                    <div class="section-header">📊 Token Usage</div>
                    <div class="section-content">
                        <div class="usage-grid">
                            <div class="usage-stat">
                                <span class="usage-label">Input</span>
                                <span class="usage-value tokens-in">${promptTokens.toLocaleString()}</span>
                            </div>
                            <div class="usage-stat">
                                <span class="usage-label">Output</span>
                                <span class="usage-value tokens-out">${completionTokens.toLocaleString()}</span>
                            </div>
                            <div class="usage-stat">
                                <span class="usage-label">Total</span>
                                <span class="usage-value tokens-total">${totalTokens.toLocaleString()}</span>
                            </div>
                            ${costDisplay ? `
                            <div class="usage-stat">
                                <span class="usage-label">Cost</span>
                                <span class="usage-value cost">${escapeHtml(costDisplay)}</span>
                            </div>` : ''}
                        </div>
                    </div>
                </div>`;
        }

        function renderRawToggle(rawContent) {
            const id = 'raw_' + Math.random().toString(36).slice(2, 9);
            const formatted = tryParseJson(rawContent);
            const display   = formatted ? prettyJson(formatted) : (rawContent || '(empty)');
            return `
                <div class="raw-toggle-area">
                    <button class="raw-toggle-btn" onclick="toggleRawJson('${id}', this)">📋 Show Raw JSON</button>
                    <div class="raw-json-container" id="${id}">
                        <pre>${escapeHtml(display)}</pre>
                    </div>
                </div>`;
        }

        // ── Content helpers ───────────────────────────────────────────────────

        function contentToString(content) {
            if (content == null) return '';
            if (typeof content === 'string') return content;
            if (Array.isArray(content)) {
                return content.map(c => {
                    if (typeof c === 'string') return c;
                    if (c.type === 'text') return c.text || '';
                    return JSON.stringify(c);
                }).join('\n');
            }
            return JSON.stringify(content);
        }

        // ── Interactive callbacks (global scope) ──────────────────────────────

        window.toggleSystemPrompt = function (id, btn) {
            const preview = document.getElementById('preview_' + id);
            const full    = document.getElementById('full_'    + id);
            if (!preview || !full) return;
            const isExpanded = full.style.display === 'block';
            preview.style.display = isExpanded ? 'inline' : 'none';
            full.style.display    = isExpanded ? 'none'   : 'block';
            btn.textContent = isExpanded ? '▼ Show full system prompt' : '▲ Hide system prompt';
        };

        window.toggleCollapsible = function (id, headerEl) {
            const block = document.getElementById(id);
            if (!block) return;
            block.classList.toggle('collapsed');
        };

        window.toggleSectionCollapse = function (id, headerEl) {
            const block = document.getElementById(id);
            if (!block) return;
            const content = block.querySelector('.section-content');
            if (!content) return;
            const hidden = content.style.display === 'none';
            content.style.display = hidden ? '' : 'none';
            const icon = headerEl.querySelector('.toggle-icon');
            if (icon) icon.style.transform = hidden ? '' : 'rotate(-90deg)';
        };

        window.toggleRawJson = function (id, btn) {
            const container = document.getElementById(id);
            if (!container) return;
            const isVisible = container.style.display === 'block';
            container.style.display = isVisible ? 'none' : 'block';
            btn.textContent = isVisible ? '📋 Show Raw JSON' : '📋 Hide Raw JSON';
        };

        // ── Filtering ─────────────────────────────────────────────────────────

        function applyFilters() {
            const typeFilter    = filterType.value;
            const sessionFilter = filterSession.value.trim().toLowerCase();

            return allEntries.filter(entry => {
                if (typeFilter && (entry.Type || '') !== typeFilter) return false;
                if (sessionFilter && !(entry.SessionId || '').toLowerCase().includes(sessionFilter)) return false;
                return true;
            });
        }

        // ── Rendering ─────────────────────────────────────────────────────────

        function renderEntries() {
            const filtered = applyFilters();
            entryCountEl.textContent = `${filtered.length} entr${filtered.length !== 1 ? 'ies' : 'y'}`;

            if (filtered.length === 0) {
                entryListEl.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>No entries found.</p>
                    </div>`;
                return;
            }

            const fragment = document.createDocumentFragment();

            filtered.forEach(entry => {
                const key        = getEntryKey(entry);
                const isExpanded = expandedIds.has(key);

                const card = document.createElement('div');
                card.className = `entry-card${isExpanded ? ' expanded' : ''}`;

                const rawType     = (entry.Type || 'UNKNOWN').toUpperCase();
                const displayType = getDisplayType(entry);
                const isSummary   = rawType.startsWith('SUMMARY');

                const { preview, pillsHtml } = buildHeaderMeta(entry);

                // Extra summary badge in addition to type badge
                const summaryBadge = isSummary
                    ? `<span class="meta-pill" style="color:#fbbf24;border-color:rgba(251,191,36,0.5)">SUMMARY</span>`
                    : '';

                // Build body HTML lazily when first expanded
                card.innerHTML = `
                    <div class="entry-header">
                        <span class="type-badge ${displayType}">${displayType}</span>
                        <span class="entry-timestamp">${formatTimestamp(entry.Timestamp)}</span>
                        <span class="entry-session" title="${escapeHtml(entry.SessionId || '')}">${escapeHtml(entry.SessionId || '—')}</span>
                        <div class="header-meta-badges">
                            ${summaryBadge}
                            ${pillsHtml}
                        </div>
                        <span class="entry-preview" title="${escapeHtml(preview)}">${escapeHtml(preview)}</span>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="entry-body"></div>`;

                const header  = card.querySelector('.entry-header');
                const bodyEl  = card.querySelector('.entry-body');
                let   bodyRendered = false;

                header.addEventListener('click', () => {
                    card.classList.toggle('expanded');
                    if (card.classList.contains('expanded')) {
                        expandedIds.add(key);
                        if (!bodyRendered) {
                            bodyEl.innerHTML = `<div class="structured-body">${renderStructuredBody(entry)}</div>`;
                            bodyRendered = true;
                        }
                    } else {
                        expandedIds.delete(key);
                    }
                });

                // If already expanded when (re-)rendered, pre-render body
                if (isExpanded) {
                    bodyEl.innerHTML = `<div class="structured-body">${renderStructuredBody(entry)}</div>`;
                    bodyRendered = true;
                }

                fragment.appendChild(card);
            });

            entryListEl.innerHTML = '';
            entryListEl.appendChild(fragment);
        }

        // ── Data fetching ─────────────────────────────────────────────────────

        async function fetchData() {
            const limit = parseInt(limitInput.value, 10) || 100;
            try {
                const res = await fetch(`/api/llm-traffic?limit=${limit}`);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                allEntries = await res.json();

                statusDot.className = 'live';
                statusText.textContent = 'Live';

                renderEntries();

                lastUpdatedEl.textContent = 'Last updated: ' + new Date().toLocaleTimeString('en-GB');
            } catch (err) {
                statusDot.className = '';
                statusText.textContent = 'Error';
                console.error('Failed to load LLM traffic data:', err);
            }
        }

        filterType.addEventListener('change', renderEntries);
        filterSession.addEventListener('input',  renderEntries);
        limitInput.addEventListener('change', fetchData);

        fetchData();
        setInterval(fetchData, 5000);

    })();
    </script>
</body>
