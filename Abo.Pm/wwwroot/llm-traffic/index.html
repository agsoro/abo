<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO - LLM Traffic Viewer</title>
    <link rel="stylesheet" href="llm-traffic.css">
</head>
<body>
    <header>
        <h1>&#128202; LLM Traffic <span style="font-size: 1rem; color: var(--text-muted); font-weight: normal;">Viewer</span></h1>
        <nav class="header-nav">
            <a href="/">&#128172; Chat</a>
            <a href="/processes/">&#9881;&#65039; Prozesse</a>
            <a href="/agents/">&#129302; Agents</a>
            <a href="/open-work/">&#128203; Offene Arbeit</a>
            <a href="/llm-traffic/" class="active">&#128202; LLM Traffic</a>
            <a href="/llm-stats/">&#128200; LLM Stats</a>
        </nav>
        <div id="status-indicator">
            <div id="status-dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <main>
        <div class="toolbar">
            <label>
                Type:
                <select id="filter-type">
                    <option value="">All</option>
                    <option value="REQUEST">REQUEST</option>
                    <option value="RESPONSE">RESPONSE</option>
                    <option value="SUMMARY_REQUEST">SUMMARY_REQUEST</option>
                    <option value="SUMMARY_RESPONSE">SUMMARY_RESPONSE</option>
                    <option value="ERROR">ERROR</option>
                </select>
            </label>
            <label>
                Session:
                <input type="text" id="filter-session" placeholder="Filter by session ID..." style="width: 200px;">
            </label>
            <label>
                Limit:
                <input type="number" id="limit-input" value="100" min="1" max="1000" style="width: 80px;">
            </label>
            <div class="spacer"></div>
            <span id="entry-count">0 entries</span>
        </div>

        <div id="entry-list" class="entry-list">
            <div class="empty-state">
                <div class="icon">&#9203;</div>
                <p>Loading data...</p>
            </div>
        </div>

        <div id="last-updated"></div>
    </main>

    <script src="llm-traffic.js" defer></script>
</body>
</html>
