<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO – Offene Arbeit</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #334155;
            --green: #16a34a;
            --green-bg: rgba(22, 163, 74, 0.15);
            --green-text: #4ade80;
            --yellow: #ca8a04;
            --yellow-bg: rgba(202, 138, 4, 0.15);
            --yellow-text: #fbbf24;
            --blue-bg: rgba(59, 130, 246, 0.15);
            --blue-text: #60a5fa;
            --tag-radius: 0.25rem;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            background-color: var(--surface-color);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .header-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            padding: 0.35rem 0.75rem;
            border-radius: var(--tag-radius);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .header-nav a:hover {
            color: var(--text-color);
            border-color: var(--primary-color);
        }

        .header-nav a.active {
            color: var(--text-color);
            border-color: var(--primary-color);
            background-color: rgba(59, 130, 246, 0.1);
        }

        #status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        #status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #94a3b8;
            transition: background-color 0.3s;
        }

        #status-dot.live {
            background-color: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .summary-card .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .summary-card .sub {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            align-items: center;
        }

        .toolbar label {
            color: var(--text-muted);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .toolbar input[type="text"] {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.4rem 0.75rem;
            border-radius: var(--tag-radius);
            font-size: 0.875rem;
        }

        .toolbar input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .toolbar .spacer { flex: 1; }

        #project-count {
            font-size: 0.875rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* Project Cards */
        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .project-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.25rem 1.5rem;
        }

        .project-card-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .project-id {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            padding-top: 0.1rem;
        }

        .project-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            flex: 1;
            line-height: 1.4;
        }

        .step-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .step-badge.implement {
            background-color: var(--yellow-bg);
            color: var(--yellow-text);
            border: 1px solid var(--yellow);
        }

        .step-badge.qa {
            background-color: var(--blue-bg);
            color: var(--blue-text);
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .step-badge.analyze {
            background-color: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.4);
        }

        .step-badge.review {
            background-color: var(--green-bg);
            color: var(--green-text);
            border: 1px solid var(--green);
        }

        .step-badge.default {
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 2rem;
        }

        .meta-item {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .meta-item strong {
            color: var(--text-color);
        }

        .env-tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: var(--tag-radius);
            font-size: 0.75rem;
            background-color: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-family: monospace;
        }

        .type-tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: var(--tag-radius);
            font-size: 0.75rem;
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            font-family: monospace;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

        #last-updated {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>📋 Offene Arbeit <span style="font-size: 1rem; color: var(--text-muted); font-weight: normal;">Laufende Projekte</span></h1>
        <nav class="header-nav">
            <a href="/">💬 Chat</a>
            <a href="/processes/">⚙️ Prozesse</a>
            <a href="/agents/">🤖 Agents</a>
            <a href="/open-work/" class="active">📋 Offene Arbeit</a>
            <a href="/llm-traffic/">📊 LLM Traffic</a>
            <a href="/llm-stats/">📈 LLM Stats</a>
        </nav>
        <div id="status-indicator">
            <div id="status-dot"></div>
            <span id="status-text">Verbinde...</span>
        </div>
    </header>

    <main>
        <!-- Summary Cards -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">Laufende Projekte</div>
                <div class="value" id="total-projects">–</div>
                <div class="sub">Aktive Projekte</div>
            </div>
            <div class="summary-card">
                <div class="label">In Implementierung</div>
                <div class="value" id="count-implement">–</div>
                <div class="sub">Step_Implement</div>
            </div>
            <div class="summary-card">
                <div class="label">In QA / Review</div>
                <div class="value" id="count-qa">–</div>
                <div class="sub">Step_QA / Step_Review</div>
            </div>
            <div class="summary-card">
                <div class="label">In Analyse</div>
                <div class="value" id="count-analyze">–</div>
                <div class="sub">Step_Analyze</div>
            </div>
        </div>

        <!-- Filter Toolbar -->
        <div class="toolbar">
            <label>
                🔍 Suche:
                <input type="text" id="filter-input" placeholder="Projektname oder ID filtern..." style="width: 280px;">
            </label>
            <div class="spacer"></div>
            <span id="project-count">0 Projekte</span>
        </div>

        <!-- Projects List -->
        <div id="projects-container" class="projects-grid">
            <div class="empty-state">
                <div class="icon">⏳</div>
                <p>Lade Daten...</p>
            </div>
        </div>

        <div id="last-updated"></div>
    </main>

    <script>
        const projectsContainer = document.getElementById('projects-container');
        const projectCountEl = document.getElementById('project-count');
        const totalProjectsEl = document.getElementById('total-projects');
        const countImplementEl = document.getElementById('count-implement');
        const countQaEl = document.getElementById('count-qa');
        const countAnalyzeEl = document.getElementById('count-analyze');
        const lastUpdatedEl = document.getElementById('last-updated');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const filterInput = document.getElementById('filter-input');

        let allProjects = [];

        function formatTimestamp(ts) {
            if (!ts) return '—';
            try {
                const d = new Date(ts);
                const now = new Date();
                const diffMs = now - d;
                const diffMin = Math.floor(diffMs / 60000);
                const diffH = Math.floor(diffMin / 60);
                const diffD = Math.floor(diffH / 24);

                if (diffMin < 1) return 'gerade eben';
                if (diffMin < 60) return `vor ${diffMin}m`;
                if (diffH < 24) return `vor ${diffH}h`;
                if (diffD < 7) return `vor ${diffD}d`;

                return d.toLocaleString('de-DE', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit',
                    timeZone: 'UTC'
                });
            } catch { return ts; }
        }

        function getStepBadgeClass(stepId) {
            if (!stepId) return 'default';
            const lower = stepId.toLowerCase();
            if (lower.includes('implement')) return 'implement';
            if (lower.includes('qa') || lower.includes('test')) return 'qa';
            if (lower.includes('analyze') || lower.includes('analyse')) return 'analyze';
            if (lower.includes('review')) return 'review';
            return 'default';
        }

        function getStepLabel(stepId) {
            const labels = {
                'Step_Implement': '🔨 Implementierung',
                'Step_QA': '🔍 QA-Tests',
                'Step_Analyze': '🔎 Analyse',
                'Step_Review': '✅ Review',
                'Step_Deploy': '🚀 Deployment',
                'Step_Plan': '📝 Planung'
            };
            return labels[stepId] || stepId || '?';
        }

        function applyFilter() {
            const query = filterInput.value.trim().toLowerCase();
            if (!query) return allProjects;
            return allProjects.filter(p =>
                (p.projectId || '').toLowerCase().includes(query) ||
                (p.title || '').toLowerCase().includes(query) ||
                (p.currentStepId || '').toLowerCase().includes(query)
            );
        }

        function updateSummary(projects) {
            totalProjectsEl.textContent = projects.length;
            countImplementEl.textContent = projects.filter(p => (p.currentStepId || '').toLowerCase().includes('implement')).length;
            countQaEl.textContent = projects.filter(p => {
                const s = (p.currentStepId || '').toLowerCase();
                return s.includes('qa') || s.includes('review');
            }).length;
            countAnalyzeEl.textContent = projects.filter(p => (p.currentStepId || '').toLowerCase().includes('analyz')).length;
        }

        function renderProjects() {
            const filtered = applyFilter();
            projectCountEl.textContent = `${filtered.length} Projekt${filtered.length !== 1 ? 'e' : ''}`;
            updateSummary(filtered);

            if (filtered.length === 0) {
                const msg = allProjects.length === 0
                    ? '<div class="icon">🎉</div><p>Keine laufenden Projekte vorhanden.</p>'
                    : '<div class="icon">🔍</div><p>Keine Projekte gefunden.</p>';
                projectsContainer.innerHTML = `<div class="empty-state">${msg}</div>`;
                return;
            }

            projectsContainer.innerHTML = filtered.map(project => {
                const stepClass = getStepBadgeClass(project.currentStepId);
                const stepLabel = getStepLabel(project.currentStepId);

                return `
                    <div class="project-card">
                        <div class="project-card-header">
                            <span class="project-id">${escapeHtml(project.projectId)}</span>
                            <div class="project-title">${escapeHtml(project.title)}</div>
                            <span class="step-badge ${stepClass}">${stepLabel}</span>
                        </div>
                        <div class="project-meta">
                            <span class="meta-item">
                                🌐 Environment: <span class="env-tag">${escapeHtml(project.environmentName || '—')}</span>
                            </span>
                            <span class="meta-item">
                                📂 Typ: <span class="type-tag">${escapeHtml(project.typeId || '—')}</span>
                            </span>
                            ${project.lastUpdated ? `
                            <span class="meta-item">
                                🕐 Zuletzt aktualisiert: <strong>${formatTimestamp(project.lastUpdated)}</strong>
                            </span>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/open-work');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                allProjects = data;

                statusDot.className = 'live';
                statusText.textContent = 'Live';

                renderProjects();

                const now = new Date();
                lastUpdatedEl.textContent = `Zuletzt aktualisiert: ${now.toLocaleTimeString('de-DE')}`;
            } catch (err) {
                statusDot.className = '';
                statusText.textContent = 'Fehler';
                console.error('Fehler beim Laden der Projektdaten:', err);
                projectsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Fehler beim Laden der Daten: ${err.message}</p>
                    </div>`;
            }
        }

        filterInput.addEventListener('input', renderProjects);

        // Initial load + Auto-Update every 10 seconds
        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
